<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Ring with Flag Colors -->
  <!-- 25% Red (top-left) -->
  <path d="M256 32C132.3 32 32 132.3 32 256H72C72 154.4 154.4 72 256 72V32Z" fill="#E21D24"/>
  <!-- 50% Gold (right side) -->
  <path d="M256 32V72C357.6 72 440 154.4 440 256C440 357.6 357.6 440 256 440V480C379.7 480 480 379.7 480 256C480 132.3 379.7 32 256 32Z" fill="#FCD34D"/>
  <!-- 25% Green (bottom-left) -->
  <path d="M72 256C72 357.6 154.4 440 256 440V480C132.3 480 32 379.7 32 256H72Z" fill="#006B3D"/>
  
  <!-- Glass Center -->
  <circle cx="256" cy="256" r="184" fill="black" fill-opacity="0.4"/>
  <circle cx="256" cy="256" r="184" stroke="white" stroke-opacity="0.1" stroke-width="2"/>
  
  <!-- Black Star / Silver Pulse -->
  <defs>
    <linearGradient id="starGradient" x1="256" y1="216" x2="256" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="40" fill="url(#starGradient)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
